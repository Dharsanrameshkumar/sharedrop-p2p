# Spring Boot Signaling Server Configuration
server.port=8080

# WebSocket Configuration
spring.websocket.max-text-message-size=65536
spring.websocket.max-binary-message-size=65536

# Room expiry (minutes) - rooms are cleaned up after inactivity
app.room.expiry-minutes=30

# Rate limiting
app.rate-limit.connections-per-minute=10
app.rate-limit.messages-per-second=20
